# Kore OS Neofetch Configuration
print_info() {
    info title
    info underline
    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "WM Theme" wm_theme
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info cols
}

ascii_distro="custom"
ascii_file="/etc/neofetch/kore-ascii"

color_blocks="on"
bold="on"
block_height=1
block_width=3
block_range=(0 15)
col_offset="auto"
separator="->"
